{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Price Compario | Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Upload CSS -->
  <link rel="stylesheet" href="{% static 'css/upload.css' %}">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<header class="main-navbar">
  <div class="nav-left">
    <i class="fa-solid fa-magnifying-glass-dollar nav-icon"></i>
    <span class="logo-text">AI Price Compare</span>
  </div>

  <nav class="nav-links">
    <a href="{% url 'home' %}">
      <i class="fa-solid fa-house"></i> Home
    </a>

    <a href="{% url 'upload' %}" class="active">
      <i class="fa-solid fa-cloud-arrow-up"></i> Upload
    </a>

    <a href="{% url 'logout' %}" class="logout">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </a>
  </nav>
</header>

<!-- ================= UPLOAD SECTION ================= -->
<section class="upload-section">
  <div class="upload-card">

    <h2 class="upload-title">
      <i class="fa-solid fa-image"></i>
      Upload Product Image
    </h2>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <label class="upload-box">
        <input type="file" name="image" accept="image/*" required hidden>
        <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
        <p>Click to choose an image</p>
        <span>JPG, PNG supported</span>
      </label>

      <button type="submit" class="upload-btn">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        Analyze Price
      </button>
    </form>

  </div>
</section>

</body>
</html>
